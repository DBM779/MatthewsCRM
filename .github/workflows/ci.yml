name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  functions:
    name: Functions load test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm ci

      - name: Smoke test (require index.js loads)
        run: |
          node -e "require('./index.js'); console.log('OK - index.js loaded on Node ' + process.version)"
