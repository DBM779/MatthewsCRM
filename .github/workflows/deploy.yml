name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/sa-key.json"
          chmod 600 "$HOME/sa-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/sa-key.json" >> "$GITHUB_ENV"

      - name: Deploy
        run: firebase deploy --only functions,hosting --project tmc-crm-f3728 --force --non-interactive

      - name: Remove key
        if: always()
        run: rm -f "$HOME/sa-key.json"

      - name: Health check
        id: health
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/body.json -w "%{http_code}" https://us-central1-tmc-crm-f3728.cloudfunctions.net/health || true)
            echo "attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Body:"; cat /tmp/body.json; echo
              exit 0
            fi
            sleep 10
          done
          echo "::error::Health check failed after 5 attempts"
          cat /tmp/body.json 2>/dev/null || true
          exit 1

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Deploy failed on main (${sha})`,
              body: `@DBM779 — automated deploy to Firebase failed. The live CRM may be in a broken state.\n\n- **Commit:** ${sha}\n- **Run logs:** ${runUrl}\n\n**Next steps:**\n1. Open the run log above and find the failing step\n2. Either push a fix (pipeline will redeploy) or revert \`${sha}\` on main\n3. Close this issue once \`/health\` is back to 200\n\nIf you want Claude to handle this, paste the run URL into a Claude Code session.`,
              labels: ['deploy-failure'],
              assignees: ['DBM779']
            });
